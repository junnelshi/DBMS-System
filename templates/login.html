<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MotoRent — Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body style="background:#f1f5f9;min-height:100vh;">

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5.5" cy="17.5" r="3.5"/>
          <circle cx="18.5" cy="17.5" r="3.5"/>
          <path d="M15 6h-3l-2 5H5.5M15 6l2 5h1.5M8 11h6"/>
        </svg>
      </div>
      <h1>Moto<span>Rent</span></h1>
      <p>Motor Rental Management System</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- ── LOGIN PANEL ── -->
    <div class="auth-panel active" id="login-panel">
      <form action="{{ url_for('login') }}" method="POST">

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input class="form-control" type="email" name="idno"
                   placeholder="you@email.com" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input class="form-control" type="password" name="password"
                   placeholder="••••••••" required/>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
          Sign In
        </button>
      </form>

      <div class="auth-footer" style="margin-top:14px;">
        Admin? Use your admin email to sign in.
      </div>
    </div>

    <!-- ── REGISTER PANEL ── -->
    <div class="auth-panel" id="register-panel">
      <form action="{{ url_for('register') }}" method="POST">

        <div class="section-label">Personal Information</div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name *</label>
            <input class="form-control" type="text" name="firstname" placeholder="Juan" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name *</label>
            <input class="form-control" type="text" name="lastname" placeholder="Dela Cruz" required/>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date of Birth *</label>
            <input class="form-control" type="date" name="birthdate" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number *</label>
            <input class="form-control" type="tel" name="phone" placeholder="09XX XXX XXXX" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Address *</label>
          <textarea class="form-control" name="address" rows="2"
                    placeholder="Street, Barangay, City, Province" required></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Driver's License No. *</label>
          <input class="form-control" type="text" name="license_no"
                 placeholder="e.g. N01-23-456789" required/>
        </div>

        <div class="section-label">Account Credentials</div>

        <div class="form-group">
          <label class="form-label">Email Address *</label>
          <input class="form-control" type="email" name="email"
                 placeholder="juan@email.com" required/>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password *</label>
            <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm *</label>
            <input class="form-control" type="password" name="confirm_password" placeholder="••••••••" required/>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
          Create Account
        </button>
      </form>
    </div>

  </div>
</div>

<script>
  // Auto-dismiss flash messages after 3 seconds
  document.querySelectorAll('.flash').forEach(flash => {
    setTimeout(() => {
      flash.style.transition = 'opacity 0.5s ease, transform 0.5s ease, max-height 0.5s ease, margin 0.5s ease, padding 0.5s ease';
      flash.style.overflow = 'hidden';
      flash.style.maxHeight = flash.offsetHeight + 'px';
      requestAnimationFrame(() => {
        flash.style.opacity = '0';
        flash.style.transform = 'translateY(-6px)';
        flash.style.maxHeight = '0';
        flash.style.marginBottom = '0';
        flash.style.padding = '0';
      });
      setTimeout(() => flash.remove(), 500);
    }, 3000);
  });
</script>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
